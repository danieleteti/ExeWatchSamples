{{if people}}
<table class="data-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Date of Birth</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {{for person in people}}
        <tr>
            <td>{{:person.id}}</td>
            <td>{{:person.firstname}}</td>
            <td>{{:person.lastname}}</td>
            <td>{{:person.dobstr}}</td>
            <td>
                <button class="btn btn-sm btn-danger"
                        hx-delete="/web/people/{{:person.id}}"
                        hx-target="#people-table-container"
                        hx-swap="innerHTML"
                        hx-confirm="Delete {{:person.firstname}} {{:person.lastname}}?">
                    Delete
                </button>
            </td>
        </tr>
        {{endfor}}
    </tbody>
</table>
<p class="table-footer">{{:people_count}} people in list</p>
{{else}}
<p class="empty-state">No people found. Add someone using the form above.</p>
{{endif}}
